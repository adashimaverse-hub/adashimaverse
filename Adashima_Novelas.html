<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adashima - Novelas Ligeras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Quicksand:wght@300;400;600&display=swap');

        :root {
            --rose: #d1a3c6;
            --rose-light: #e8c8df;
            --purple: #8c5a96;
            --dark-purple: #5c3a6b;
            --bg-dark: #141018;
            --text-light: rgba(209,163,198,0.92);
            --border: rgba(209,163,198,0.18);
            --glass: rgba(255,255,255,0.72);
            --glass-border: rgba(209,163,198,0.35);
            --shadow-soft: 0 8px 32px rgba(92,58,107,0.10);
            --shadow-hover: 0 16px 48px rgba(92,58,107,0.18);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            display: flex;
            min-height: 100vh;
            background: linear-gradient(135deg, #fbe9e7 0%, #f3e5f5 50%, #e8eaf6 100%);
            color: #4a3b52;
            overflow-x: hidden;
        }

        
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .star { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; box-shadow: 0 0 8px 2px rgba(255,255,255,0.7); animation: float-up 12s linear infinite, twinkle 4s ease-in-out infinite; opacity: 0; }
        @keyframes float-up { 0% { transform: translateY(100vh) scale(0.4); opacity: 0; } 15% { opacity: 0.6; } 85% { opacity: 0.6; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
        @keyframes twinkle { 0%,100% { box-shadow: 0 0 4px 1px rgba(255,255,255,0.4); } 50% { box-shadow: 0 0 12px 3px rgba(255,200,255,0.8); } }

        
        .sidebar { width: 300px; background-color: rgba(209,163,198,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; box-shadow: 2px 0 24px rgba(92,58,107,0.12); position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .sidebar-inner { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100%; padding: 30px 20px; width: 100%; }
        .sidebar-box { width: 100%; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; }
        .sidebar-box img { width: 100%; height: auto; object-fit: cover; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(92,58,107,0.25); border-radius: 10px; }

        
        .main-content {
            flex: 1;
            position: relative;
            padding: 48px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            background: url('Imagenes/Fondo_seccion_novela.png') center/cover no-repeat fixed;
        }

        .main-content::before {
            content: '';
            position: fixed;
            top: 0; left: 300px; right: 0; bottom: 0;
            background: rgba(255,255,255,0.72);
            z-index: -1;
            pointer-events: none;
        }

        
        h1.update-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 3.2rem;
            color: #5c3a6b;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 2px 16px rgba(255,255,255,0.9);
            letter-spacing: -0.5px;
            animation: title-in 0.6s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes title-in { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: none; } }

        .header-container { width: 100%; max-width: 920px; margin-bottom: 28px; position: relative; }
        
        .header-top-controls { position: absolute; top: 0; right: 0; z-index: 10; }

        .lang-controls {
            position: absolute;
            top: 20px;
            right: 40px;
            z-index: 100;
        }

        .lang-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(232,200,223,0.6));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(209,163,198,0.5);
            border-radius: 32px;
            padding: 12px 24px;
            box-shadow: 0 8px 32px rgba(92,58,107,0.15), inset 0 1px 2px rgba(255,255,255,0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .lang-wrapper:hover {
            border-color: rgba(209,163,198,0.8);
            box-shadow: 0 12px 40px rgba(92,58,107,0.25), inset 0 1px 2px rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }

        .lang-wrapper i {
            color: #8c5a96;
            font-size: 1.2rem;
            flex-shrink: 0;
            pointer-events: none;
            animation: rotate-globe 3s ease-in-out infinite;
        }

        @keyframes rotate-globe {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }

        .lang-wrapper:hover i {
            animation: rotate-globe 0.6s ease-in-out;
        }

        .lang-dropdown {
            position: relative;
        }

        .lang-dropdown-toggle {
            background: transparent;
            border: none;
            color: #5c3a6b;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 9px;
            transition: color 0.3s ease;
        }

        .lang-dropdown-toggle:hover {
            color: #8c5a96;
        }

        .lang-dropdown-toggle:focus-visible {
            color: #8c5a96;
        }

        .lang-dropdown-toggle:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .lang-caret {
            font-size: 0.68rem;
            color: #8c5a96;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lang-dropdown.open .lang-caret {
            transform: rotate(180deg);
        }

        .lang-dropdown-menu {
            position: absolute;
            top: calc(100% + 14px);
            right: -24px;
            min-width: 170px;
            margin: 0;
            list-style: none;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(232,200,223,0.88));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(209,163,198,0.5);
            border-radius: 18px;
            padding: 8px;
            box-shadow: 0 12px 32px rgba(92,58,107,0.25), inset 0 1px 2px rgba(255,255,255,0.6);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transform-origin: top right;
            transition: opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1), transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.28s;
            z-index: 200;
        }

        .lang-dropdown.open .lang-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .lang-option {
            padding: 10px 16px;
            border-radius: 12px;
            color: #5c3a6b;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.25s ease, color 0.25s ease, padding-left 0.25s ease;
        }

        .lang-option:hover {
            background: rgba(140, 90, 150, 0.15);
            color: #7b4c73;
            padding-left: 20px;
        }

        .lang-option.selected {
            background: rgba(140, 90, 150, 0.18);
            color: #7b4c73;
            font-weight: 700;
        }

        #menu-container a:hover,
        #menu-container button:hover,
        #sidebar-container a:hover,
        #sidebar-container button:hover { transform: none !important; }

        
        .general-downloads { display: none; justify-content: center; gap: 12px; margin-top: 14px; }

        
        .back-link-bottom {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition);
            padding: 12px 28px;
            border-radius: 24px;
            background: linear-gradient(135deg, #d1a3c6 0%, #8c5a96 100%);
            box-shadow: 0 4px 16px rgba(139,90,150,0.28);
            margin-top: 40px;
        }
        .back-link-bottom:hover { background: linear-gradient(135deg, #8c5a96 0%, #5c3a6b 100%); box-shadow: 0 8px 24px rgba(92,58,107,0.38); }

        
        .update-box {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1.5px solid var(--glass-border);
            width: 100%;
            max-width: 920px;
            padding: 32px;
            box-shadow: var(--shadow-soft);
            max-height: 76vh;
            overflow-y: auto;
            animation: box-in 0.5s cubic-bezier(0.4,0,0.2,1) 0.1s both;
        }
        @keyframes box-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
        .update-box::-webkit-scrollbar { width: 5px; }
        .update-box::-webkit-scrollbar-thumb { background: rgba(209,163,198,0.5); border-radius: 10px; }

        
        .novel-item {
            margin-bottom: 14px;
            background: rgba(255,255,255,0.55);
            border-radius: 18px;
            border: 1.5px solid rgba(209,163,198,0.22);
            overflow: hidden;
            transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
        }

        .novel-item.extra-stories-special {
            background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(232,200,223,0.55));
            border: 2px solid rgba(209,163,198,0.5);
            box-shadow: 0 0 20px rgba(209,163,198,0.25), 0 8px 28px rgba(92,58,107,0.12);
        }

        .novel-item.extra-stories-special:hover {
            box-shadow: 0 0 30px rgba(209,163,198,0.35), 0 12px 36px rgba(92,58,107,0.15);
            border-color: rgba(209,163,198,0.7);
        }

        .novel-item:last-child { margin-bottom: 0; }
        .novel-item:hover { box-shadow: 0 6px 24px rgba(92,58,107,0.09); border-color: rgba(209,163,198,0.4); }
        details[open].novel-item { border-color: rgba(209,163,198,0.5); box-shadow: 0 8px 28px rgba(92,58,107,0.12); }

        summary.novel-summary {
            font-size: 1.05rem;
            color: #5c3a6b;
            font-weight: 600;
            cursor: pointer;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            transition: background var(--transition);
            user-select: none;
        }

        .extra-stories-special summary.novel-summary {
            background: linear-gradient(135deg, rgba(209,163,198,0.15), rgba(140,90,150,0.1));
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .extra-stories-special summary.novel-summary span {
            background: linear-gradient(135deg, #d1a3c6, #8c5a96);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        summary.novel-summary::-webkit-details-marker { display: none; }
        summary.novel-summary:hover { background: rgba(255,255,255,0.7); }

        .extra-stories-special summary.novel-summary:hover {
            background: linear-gradient(135deg, rgba(209,163,198,0.25), rgba(140,90,150,0.15));
        }

        summary.novel-summary i.fa-book { margin-right: 12px; color: var(--rose); transition: color var(--transition); }
        summary.novel-summary:hover i.fa-book { color: var(--purple); }

        .extra-stories-special summary.novel-summary i.fa-book {
            color: #8c5a96;
            animation: icon-pulse 2s ease-in-out infinite;
        }

        @keyframes icon-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .chevron-icon { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; color: var(--rose); }
        details[open] summary.novel-summary .chevron-icon { transform: rotate(180deg); }

        .novel-content { padding: 0 22px 22px; display: flex; flex-direction: column; gap: 16px; }
        .novel-description { color: #7b5e8c; font-size: 0.9rem; line-height: 1.65; padding-top: 2px; }

        .translator-credit {
            display: block; 
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(209,163,198,0.15);
            font-size: 0.8rem;
            color: rgba(92,58,107,0.55);
            text-align: center;
        }

        .translator-credit a {
            color: rgba(209,163,198,0.8);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 1px dashed rgba(209,163,198,0.4);
        }

        .translator-credit a:hover {
            color: #8c5a96;
            border-bottom-color: rgba(209,163,198,0.7);
        }


        
        .custom-pdf-viewer {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 820px;
            min-height: 600px;
            background: #1e1a24;
            border-radius: 16px;
            overflow: hidden;
            border: 1.5px solid rgba(209,163,198,0.2);
            box-shadow: 0 12px 40px rgba(20,10,30,0.28), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: box-shadow var(--transition);
            position: relative;
        }
        .custom-pdf-viewer:hover { box-shadow: 0 18px 52px rgba(20,10,30,0.34), inset 0 1px 0 rgba(255,255,255,0.06); }

        
        .pdf-toolbar {
            background: rgba(30,26,36,0.98);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(209,163,198,0.1);
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            z-index: 10;
        }

        .pdf-controls-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .pdf-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(209,163,198,0.85);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.18s ease;
            font-size: 0.82rem;
            text-decoration: none;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .pdf-btn:hover { background: rgba(209,163,198,0.18); color: #e8c8df; border-color: rgba(209,163,198,0.25); transform: translateY(-1px); }
        .pdf-btn:active { transform: translateY(0); background: rgba(209,163,198,0.25); }
        .pdf-btn.active { background: linear-gradient(135deg, rgba(209,163,198,0.3), rgba(140,90,150,0.4)); color: #e8c8df; border-color: rgba(209,163,198,0.4); }

        .pdf-btn-reset:hover i,
        .pdf-btn-reset:active i { animation: spin-once 0.4s ease; }
        @keyframes spin-once { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pdf-zoom-display { font-size: 0.82rem; color: rgba(209,163,198,0.7); font-weight: 700; padding: 4px 10px; background: rgba(255,255,255,0.04); border-radius: 7px; min-width: 54px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .pdf-page-info { font-size: 0.82rem; color: rgba(209,163,198,0.8); font-weight: 600; min-width: 100px; text-align: center; white-space: nowrap; }
        .pdf-page-input { width: 50px; padding: 5px 8px; border: 1px solid rgba(209,163,198,0.2); border-radius: 7px; color: rgba(209,163,198,0.9); font-weight: 600; text-align: center; background: rgba(255,255,255,0.06); font-size: 0.82rem; transition: all 0.2s; font-family: 'Quicksand', sans-serif; }
        .pdf-page-input:focus { outline: none; border-color: rgba(209,163,198,0.5); background: rgba(255,255,255,0.1); box-shadow: 0 0 0 3px rgba(209,163,198,0.12); }
        .pdf-page-input::placeholder { color: rgba(209,163,198,0.35); }

        .pdf-progress-wrap { width: 100%; height: 2px; background: rgba(255,255,255,0.04); flex-shrink: 0; }
        .pdf-progress-fill { height: 100%; background: linear-gradient(to right, var(--rose), var(--purple)); transition: width 0.25s ease; }

        .pdf-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }

        .pdf-canvas-container {
            flex: 1;
            overflow: auto;
            background: #16121e;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 28px;
            position: relative;
        }
        .pdf-canvas-container::-webkit-scrollbar { width: 7px; height: 7px; }
        .pdf-canvas-container::-webkit-scrollbar-track { background: #0e0b14; }
        .pdf-canvas-container::-webkit-scrollbar-thumb { background: rgba(209,163,198,0.25); border-radius: 6px; }
        .pdf-canvas-container::-webkit-scrollbar-thumb:hover { background: rgba(209,163,198,0.4); }

        .pdf-canvas-wrapper { position: relative; display: inline-block; }
        .pdf-canvas-wrapper canvas {
            display: block;
            background: white;
            box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .pdf-loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(14,10,22,0.82);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-radius: 16px;
            backdrop-filter: blur(4px);
        }
        .pdf-loading-overlay.visible { display: flex; }
        .pdf-spinner { width: 36px; height: 36px; border: 2.5px solid rgba(209,163,198,0.12); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pdf-loading-text { color: rgba(209,163,198,0.75); font-size: 0.84rem; font-weight: 600; letter-spacing: 0.02em; }

        .pdf-error-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px 20px;
            text-align: center;
            color: rgba(209,163,198,0.55);
        }
        .pdf-error-state i { font-size: 2.2rem; opacity: 0.4; }
        .pdf-error-state p { font-size: 0.86rem; line-height: 1.6; }

        .actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn { background: rgba(255,255,255,0.8); color: #5c3a6b; padding: 9px 20px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 0.88rem; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; border: 1.5px solid rgba(209,163,198,0.4); cursor: pointer; backdrop-filter: blur(8px); }
        .btn:hover { background: linear-gradient(135deg, #d1a3c6 0%, #c993b8 100%); color: white; box-shadow: 0 6px 18px rgba(209,163,198,0.38); border-color: transparent; }
        .btn-download { background: linear-gradient(135deg, #8c5a96, #5c3a6b); color: white; border-color: transparent; }
        .btn-download:hover { background: linear-gradient(135deg, #5c3a6b, #3d2450); }

        
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.78rem;
            color: rgba(92,58,107,0.5);
            z-index: 5;
            line-height: 1.7;
        }

        .sneikki-credit {
            margin-top: 12px;
            font-size: 0.75rem;
            color: rgba(92,58,107,0.5);
        }

        .sneikki-credit a {
            color: rgba(209,163,198,0.75);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
            border-bottom: 1px solid rgba(209,163,198,0.4);
        }

        .sneikki-credit a:hover {
            color: rgba(209,163,198,0.95);
            border-bottom-color: rgba(209,163,198,0.8);
        }

        
        .floating-adashima { position: fixed; bottom: 30px; right: 30px; width: 180px; animation: float-astronaut 8s ease-in-out infinite; z-index: 100; filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.18)); transition: filter 0.3s; }
        .floating-adashima:hover { filter: drop-shadow(0px 10px 20px rgba(140,90,150,0.4)); }
        .floating-adashima img { width: 100%; border-radius: 50%; }
        @keyframes float-astronaut { 0% { transform: translateY(0px) rotate(0deg); } 33% { transform: translateY(-14px) rotate(4deg); } 66% { transform: translateY(9px) rotate(-4deg); } 100% { transform: translateY(0px) rotate(0deg); } }

        .custom-pdf-viewer:fullscreen { border-radius: 0; }
        .custom-pdf-viewer:fullscreen .pdf-canvas-container { height: calc(100vh - 110px); }
        .custom-pdf-viewer:-webkit-full-screen { border-radius: 0; }
        .custom-pdf-viewer:-webkit-full-screen .pdf-canvas-container { height: calc(100vh - 110px); }

        .custom-pdf-viewer.fs-simulated {
            position: fixed !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100vh !important;
            z-index: 99999 !important;
            border-radius: 0 !important;
            padding: 0 !important;
            background: #16121e;
            box-shadow: none !important;
        }
        .custom-pdf-viewer.fs-simulated .pdf-canvas-container { height: calc(100vh - 110px) !important; }

        .toast-message {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,20,44,0.94);
            backdrop-filter: blur(16px);
            color: rgba(209,163,198,0.95);
            padding: 11px 24px;
            border-radius: 24px;
            z-index: 1000;

                return;
            }
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(a);

            window.open(url, '_blank');

    const pdfInstances = {};

    function calcFitScaleSafe(page, containerEl) {
        const vp = page.getViewport({ scale: 1 });
        const w  = containerEl.clientWidth  - 48;
        const h  = containerEl.clientHeight - 48;

        const safeW = w  > 20 ? w  : Math.max(window.innerWidth  - 380, 300);
        const safeH = h  > 20 ? h  : Math.max(window.innerHeight - 200, 400);

        const scaleW = safeW / vp.width;
        const scaleH = safeH / vp.height;
        const scale  = Math.min(scaleW, scaleH, 2.5);

        return isFinite(scale) && scale > 0 ? scale : 1.0;
    }

    function buildVolumeHTML(vol) {

        const isExtraStories = currentLang === 'en' && vol.id === 'ESC';

                                <button class="btn" onclick="initPdfViewer('${vol.id}')" style="margin-top:8px;"><i class="fas fa-redo"></i> Reintentar</button>

    async function initPdfViewer(id) {
        const viewerEl    = document.getElementById('pdf-viewer-' + id);
        const canvas      = document.getElementById('pdf-render-' + id);
        const ctx         = canvas.getContext('2d');
        const loadingEl   = document.getElementById('pdf-loading-' + id);
        const loadingText = document.getElementById('pdf-loading-text-' + id);
        const errorEl     = document.getElementById('pdf-error-' + id);
        const containerEl = document.getElementById('canvas-container-' + id);

        const volData = VOLUMES.find(v => v.id === id);
        if (!volData || !volData[currentLang]) return;

        const langData = volData[currentLang];
        const baseUrl = currentLang === 'es' ? 'https://media.adashimaverse.com/Novelas/' : 'https://media.adashimaverse.com/Novelas/Ingles/';
        const fileTarget = currentLang === 'es' ? langData.file : langData.filePdf;

        if (pdfInstances[id]?.loading) return;

        const inst = pdfInstances[id] || {
            pdfDoc: null, pageNum: 1, rendering: false, pendingPage: null, scale: 1.0, fitScale: 1.0, loading: false, canvas, ctx, containerEl,
        };
        inst.loading = true;
        pdfInstances[id] = inst;

        if (loadingEl) loadingEl.classList.add('visible');
        if (errorEl)   errorEl.style.display = 'none';
        canvas.style.display = 'none';

        if (!fileTarget) {
            inst.loading = false;
            if (loadingEl) loadingEl.classList.remove('visible');
            if (errorEl) {
                const msgEl = document.getElementById('pdf-error-msg-' + id);
                if (msgEl) msgEl.textContent = currentLang === 'es' ? 'Documento no disponible.' : 'Document not available.';
                errorEl.style.display = 'flex';
            }
            return;
        }

        const url = baseUrl + encodeURIComponent(fileTarget);

        if (loadingText) {
            loadingText.textContent = currentLang === 'es' ? 'Cargando documento...' : 'Loading document...';
        }

        if (!inst._pageInputBound) {
            inst._pageInputBound = true;
            const pageInput = document.getElementById('page-input-' + id);
            if (pageInput) {
                pageInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter') {
                        const n = parseInt(pageInput.value);
                        if (n >= 1 && n <= inst.pdfDoc?.numPages) {
                            inst.pageNum = n;
                            queueRender(id);
                        }
                        pageInput.value = '';
                    }
                });
            }
        }

        const renderVersion = currentRenderVersion;
        const cacheKey = `${currentLang}-${id}`;

        try {
            let pdfData;

            if (pdfCache.has(cacheKey)) {
                pdfData = pdfCache.get(cacheKey);
            } else {
                const response = await fetch(url, { signal: globalAbortController.signal });
                if (!response.ok) throw new Error('Network error');
                const arrayBuffer = await response.arrayBuffer();
                pdfData = new Uint8Array(arrayBuffer);
                pdfCache.set(cacheKey, pdfData);
            }

            if (renderVersion !== currentRenderVersion) return;

            inst.pdfDoc = await pdfjsLib.getDocument({
                data: pdfData,
                cMapUrl: `${PDFJS_CDN}/cmaps/`,
                cMapPacked: true,
                rangeChunkSize: 65536
            }).promise;

            if (renderVersion !== currentRenderVersion) return;

            document.getElementById('page_count_' + id).textContent = inst.pdfDoc.numPages;

            const firstPage = await inst.pdfDoc.getPage(1);
            inst.fitScale   = calcFitScaleSafe(firstPage, containerEl);
            inst.scale      = inst.fitScale;

            updateZoomDisplay(id);
            await renderPage(id, 1);

            inst.loading = false;

        } catch (err) {
            if (err.name === 'AbortError') return;
            inst.pdfDoc = null;
            inst.loading = false;
            if (loadingEl) loadingEl.classList.remove('visible');
            if (errorEl) {
                const msgEl = document.getElementById('pdf-error-msg-' + id);
                if (msgEl) msgEl.textContent = currentLang === 'es' ? 'Documento no disponible.' : 'Document not available.';
                errorEl.style.display = 'flex';
            }
            canvas.style.display = 'none';
        }
    }

    async function renderPage(id, num) {
        const inst = pdfInstances[id];
        if (!inst || !inst.pdfDoc) return;

        num = Math.max(1, Math.min(num, inst.pdfDoc.numPages));
        inst.pageNum = num;

        if (inst.rendering) {
            inst.pendingPage = num;
            return;
        }
        inst.rendering = true;

        const loadingEl  = document.getElementById('pdf-loading-' + id);
        const progressEl = document.getElementById('pdf-progress-' + id);
        const pageNumEl  = document.getElementById('page_num_' + id);

        try {
            const page = await inst.pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: inst.scale });

            const outputScale = window.devicePixelRatio || 1;

            inst.canvas.width = Math.floor(viewport.width * outputScale);
            inst.canvas.height = Math.floor(viewport.height * outputScale);

            inst.canvas.style.width = Math.floor(viewport.width) + "px";
            inst.canvas.style.height =  Math.floor(viewport.height) + "px";
            inst.canvas.style.display = 'block';

            inst.ctx.clearRect(0, 0, inst.canvas.width, inst.canvas.height);

            const errorEl = document.getElementById('pdf-error-' + id);
            if (errorEl) errorEl.style.display = 'none';

            const transform = outputScale !== 1
                ? [outputScale, 0, 0, outputScale, 0, 0]
                : null;

            const renderContext = {
                canvasContext: inst.ctx,
                transform: transform,
                viewport: viewport
            };

            await page.render(renderContext).promise;

            if (pageNumEl) pageNumEl.textContent = num;

            const mobileNumEl = document.getElementById('mobile-page-num-' + id);
            const mobileCountEl = document.getElementById('mobile-page-count-' + id);
            if (mobileNumEl) mobileNumEl.textContent = num;
            if (mobileCountEl && inst.pdfDoc) mobileCountEl.textContent = inst.pdfDoc.numPages;
            if (progressEl) progressEl.style.width = ((num / inst.pdfDoc.numPages) * 100).toFixed(1) + '%';

        } catch (err) {
            const loadingText = document.getElementById('pdf-loading-text-' + id);
            if (loadingText) loadingText.textContent = currentLang === 'es' ? `Error en pág. ${num}.` : `Error on pg. ${num}.`;
            if (loadingEl) {
                loadingEl.classList.add('visible');
                setTimeout(() => loadingEl.classList.remove('visible'), 2500);
            }
        } finally {
            if (loadingEl) loadingEl.classList.remove('visible');
            inst.rendering = false;

            if (inst.pendingPage !== null) {
                const pending = inst.pendingPage;
                inst.pendingPage = null;
                renderPage(id, pending);
            }
        }
    }

    function queueRender(id) {
        const inst = pdfInstances[id];
        if (!inst) return;
        if (inst.rendering) {
            inst.pendingPage = inst.pageNum;
        } else {
            renderPage(id, inst.pageNum);
        }
    }

    const ZOOM_STEP = 0.15;
    const ZOOM_MIN  = 0.4;
    const ZOOM_MAX  = 3.0;

    function updateZoomDisplay(id) {
        const inst = pdfInstances[id];
        const el   = document.getElementById('zoom-display-' + id);
        if (!el || !inst) return;
        const pct = Math.round((inst.scale / inst.fitScale) * 100);
        el.textContent = pct + '%';

        const mobileNum = document.getElementById('mobile-page-num-' + id);
        const mobileCount = document.getElementById('mobile-page-count-' + id);
        const mob = document.getElementById('mobile-indicator-' + id);
        if (mobileNum && mobileCount && inst && inst.pdfDoc) {
            mobileNum.textContent = inst.pageNum;
            mobileCount.textContent = inst.pdfDoc.numPages;
            if (mob) mob.style.display = '';
        }
    }

    function applyZoom(id, newScale) {
        const inst = pdfInstances[id];
        if (!inst || !inst.pdfDoc) return;
        inst.scale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newScale));
        updateZoomDisplay(id);
        queueRender(id);
    }

    window.pdfAction = function(id, action) {
        const inst = pdfInstances[id];
        if (!inst) return;

        switch (action) {
            case 'prev':
                if (inst.pageNum > 1) { inst.pageNum--; queueRender(id); }
                break;
            case 'next':
                if (inst.pdfDoc && inst.pageNum < inst.pdfDoc.numPages) { inst.pageNum++; queueRender(id); }
                break;
            case 'zoomIn':
                applyZoom(id, inst.scale + ZOOM_STEP);
                break;
            case 'zoomOut':
                applyZoom(id, inst.scale - ZOOM_STEP);
                break;
            case 'zoomReset':
                applyZoom(id, inst.fitScale);
                break;
            case 'fullscreen': {
                const el = document.getElementById('pdf-viewer-' + id);
                if (!el) break;

                const isNativeFS = document.fullscreenElement === el || document.webkitFullscreenElement === el || document.msFullscreenElement === el;
                const isSimulated = el.classList.contains('fs-simulated');

                if (!isNativeFS && !isSimulated) {
                    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                    if (req) {
                        req.call(el).catch(() => enterSimulatedFS(el, id));
                    } else {
                        enterSimulatedFS(el, id);
                    }
                } else {
                    if (isNativeFS) {
                        const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
                        if (exit) exit.call(document);
                    } else if (isSimulated) {
                        exitSimulatedFS(el, id);
                    }
                }
                break;
            }
        }
    };

    document.addEventListener('fullscreenchange',      updateFSIcon);
    document.addEventListener('webkitfullscreenchange', updateFSIcon);
    function updateFSIcon() {
        document.querySelectorAll('[id^="fs-icon-"]').forEach(icon => {
            const id = icon.id.replace('fs-icon-', '');
            const viewer = document.getElementById('pdf-viewer-' + id);
            const inNativeFS = viewer && (document.fullscreenElement === viewer || document.webkitFullscreenElement === viewer || document.msFullscreenElement === viewer);
            const inSimulatedFS = viewer && viewer.classList.contains('fs-simulated');
            const inFS = !!(inNativeFS || inSimulatedFS);
            icon.className = inFS ? 'fas fa-compress' : 'fas fa-expand';

            if (inFS) {
                const inst = pdfInstances[id];
                if (inst && inst.pdfDoc) {
                    inst.pdfDoc.getPage(inst.pageNum).then(page => {
                        const containerEl = document.getElementById('canvas-container-' + id);
                        inst.fitScale = calcFitScaleSafe(page, containerEl);
                        inst.scale    = inst.fitScale;
                        updateZoomDisplay(id);
                        queueRender(id);
                    }).catch(()=>{});
                }
            }
        });
    }

    function enterSimulatedFS(viewerEl, id) {
        if (!viewerEl) return;
        viewerEl.classList.add('fs-simulated');
        document.body.style.overflow = 'hidden';

        const inst = pdfInstances[id];
        if (inst && inst.pdfDoc) {
            inst.pdfDoc.getPage(inst.pageNum).then(page => {
                const containerEl = document.getElementById('canvas-container-' + id);
                inst.fitScale = calcFitScaleSafe(page, containerEl);
                inst.scale = inst.fitScale;
                updateZoomDisplay(id);
                queueRender(id);
            }).catch(()=>{});
        }
        updateFSIcon();
    }

    function exitSimulatedFS(viewerEl, id) {
        if (!viewerEl) return;
        viewerEl.classList.remove('fs-simulated');
        document.body.style.overflow = '';
        const inst = pdfInstances[id];
        if (inst && inst.pdfDoc) {
            inst.pdfDoc.getPage(inst.pageNum).then(page => {
                const containerEl = document.getElementById('canvas-container-' + id);
                inst.fitScale = calcFitScaleSafe(page, containerEl);
                inst.scale = inst.fitScale;
                updateZoomDisplay(id);
                queueRender(id);
            }).catch(()=>{});
        }
        updateFSIcon();
    }

    document.addEventListener('wheel', e => {
        if (!activeId || !pdfInstances[activeId]) return;
        const viewer = document.getElementById('pdf-viewer-' + activeId);
        if (!viewer || !viewer.contains(e.target)) return;
        if (!e.ctrlKey && !e.metaKey) return;
        e.preventDefault();
        pdfAction(activeId, e.deltaY < 0 ? 'zoomIn' : 'zoomOut');
    }, { passive: false });

    document.addEventListener('keydown', e => {
        if (!activeId || !pdfInstances[activeId]) return;
        if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;

        switch (e.key) {
            case 'ArrowLeft':  e.preventDefault(); pdfAction(activeId, 'prev'); break;
            case 'ArrowRight': e.preventDefault(); pdfAction(activeId, 'next'); break;
            case '+': case '=': pdfAction(activeId, 'zoomIn');    break;
            case '-': case '_': pdfAction(activeId, 'zoomOut');   break;
            case '0':           pdfAction(activeId, 'zoomReset'); break;
            case 'f': case 'F': pdfAction(activeId, 'fullscreen'); break;
        }
    });

    function attachAccordion() {
        document.querySelectorAll('details.novel-item').forEach(detail => {
            detail.addEventListener('toggle', () => {
                if (detail.open) {
                    document.querySelectorAll('details.novel-item').forEach(other => {
                        if (other !== detail && other.open) other.removeAttribute('open');
                    });
                    const id = detail.id.replace('novel-', '');
                    activeId = id;
                    requestAnimationFrame(() => {
                        enableTouchNavigationForViewer(id);
                        initPdfViewer(id);
                    });
                } else {
                    activeId = null;
                }
            });
        });
    }

    function enableTouchNavigationForViewer(id) {
        const container = document.getElementById('canvas-container-' + id);
        if (!container) return;

        let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

        function isInteractive(el) {
            return el.closest && (
                el.closest('.pdf-toolbar') || el.closest('button') || el.closest('input') || el.closest('a') || el.closest('.pdf-controls-group') || el.closest('.pdf-page-input')
            );
        }

        container.addEventListener('touchstart', e => {
            if (!e.touches || e.touches.length !== 1) return;
            const touch = e.touches[0];

            if (isInteractive(e.target)) return;
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        container.addEventListener('touchend', e => {
            const touch = e.changedTouches && e.changedTouches[0];
            if (!touch) return;
            const dx = Math.abs(touch.clientX - touchStartX);
            const dy = Math.abs(touch.clientY - touchStartY);
            const dt = Date.now() - touchStartTime;

            if (dt > 350 || dx > 40 || dy > 40) return;
            if (isInteractive(e.target)) return;

            const rect = container.getBoundingClientRect();
            const relX = (touch.clientX - rect.left) / rect.width;

            if (relX <= 0.45) {
                pdfAction(id, 'prev');
            } else if (relX >= 0.55) {
                pdfAction(id, 'next');
            }
        }, { passive: true });
    }

    function renderGeneralDownloads() {
        const container = document.getElementById('general-downloads-container');
        if (currentLang === 'es') {
            container.style.display = 'none';
            container.innerHTML = '';
        } else {
            container.style.display = 'flex';
            container.innerHTML = `
                <button class="btn" onclick="smartDownload('https://media.adashimaverse.com/Novelas/Ingles/Adachi%20and%20Shimamura.pdf', 'Adachi and Shimamura Full.pdf')"><i class="fas fa-file-pdf"></i> Download PDF Full</button>
                <button class="btn" onclick="smartDownload('https://media.adashimaverse.com/Novelas/Ingles/Adachi%20and%20Shimamura.epub', 'Adachi and Shimamura Full.epub')"><i class="fas fa-book-open"></i> Download EPUB Full</button>
            `;
        }
    }

    async function loadMenu() {
        const menuFile = currentLang === 'es' ? 'menu.html' : 'menu2.html';
        const menuVer = Math.floor(Date.now() / 86400000);

        try {
            const response = await fetch(`${menuFile}?v=${menuVer}`);
            if (!response.ok) throw new Error('Error HTTP ' + response.status);
            const data = await response.text();

            const container = document.getElementById('sidebar-container') || document.getElementById('menu-container');
            if (!container) return;

            container.innerHTML = data;
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        } catch (error) {}
    }

    async function renderApp() {
        const title = document.getElementById('page-title');
        title.textContent = currentLang === 'es' ? 'Novelas Ligeras' : 'Light Novels';

        const footer = document.getElementById('footer-content');
        
        if (footer) {
            footer.innerHTML = currentLang === 'es'
                ? 'Fan site no oficial de Adachi to Shimamura.<br>Creado por fans, sin fines de lucro.<br>Adachi to Shimamura y todos sus derechos pertenecen a Hitoma Iruma.'
                : 'Unofficial Adachi to Shimamura fan site.<br>Created by fans, non-profit.<br>Adachi to Shimamura and all rights belong to Hitoma Iruma.';
        }

        const floatingAdashima = document.getElementById('floating-link');
        if (floatingAdashima) {
            floatingAdashima.title = currentLang === 'es' ? 'Ir al mini-juego' : 'Go to mini-game';
        }

        renderGeneralDownloads();

        const container = document.getElementById('novels-container');
        const openId = document.querySelector('details.novel-item[open]')?.id.replace('novel-', '');

        container.innerHTML = VOLUMES.map(buildVolumeHTML).join('');
        attachAccordion();

        if (openId) {
            const detail = document.getElementById('novel-' + openId);
            if (detail) {
                detail.setAttribute('open', '');
                activeId = openId;
                requestAnimationFrame(() => {
                    enableTouchNavigationForViewer(openId);
                    initPdfViewer(openId);
                });
            }
        }
    }

    async function switchLanguage(lang) {
        if (isSwitching || currentLang === lang) return;
        isSwitching = true;

        const langToggle = document.getElementById('langToggle');
        if (langToggle) {
            langToggle.disabled = true;
        }

        globalAbortController.abort();
        globalAbortController = new AbortController();
        currentRenderVersion++;

        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.documentElement.lang = lang;
        updateLangDropdownLabel();

        Object.keys(pdfInstances).forEach(k => {
            const inst = pdfInstances[k];
            if (inst) inst.pdfDoc = null;
        });

        await renderApp();
        await loadMenu();

        if (langToggle) {
            langToggle.disabled = false;
        }
        isSwitching = false;
    }

    const langDropdown = document.getElementById('langDropdown');
    const langToggle = document.getElementById('langToggle');

    if (langDropdown && langToggle) {
        langToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (langToggle.disabled) return;
            const isOpen = langDropdown.classList.toggle('open');
            langToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });

        document.querySelectorAll('.lang-option').forEach(option => {
            option.addEventListener('click', () => {
                const lang = option.getAttribute('data-lang');
                langDropdown.classList.remove('open');
                langToggle.setAttribute('aria-expanded', 'false');
                switchLanguage(lang);
            });
        });

        document.addEventListener('click', (e) => {
            if (langDropdown.classList.contains('open') && !langDropdown.contains(e.target)) {
                langDropdown.classList.remove('open');
                langToggle.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && langDropdown.classList.contains('open')) {
                langDropdown.classList.remove('open');
                langToggle.setAttribute('aria-expanded', 'false');
            }
        });
    }

    updateLangDropdownLabel();

    async function loadVolumes() {
        const dayKey = Math.floor(Date.now() / 86400000);
        try {
            const res = await fetch(`volumes.json?v=${dayKey}`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const remote = await res.json();
            if (Array.isArray(remote) && remote.length > 0) {
                VOLUMES.length = 0;
                remote.forEach(v => VOLUMES.push(v));
            }
        } catch (_) {

        }
    }

    (function() {
        const c = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDelay = Math.random() * 12 + 's';
            s.style.animationDuration = (9 + Math.random() * 5) + 's';
            c.appendChild(s);
        }
    })();

    document.addEventListener('DOMContentLoaded', async () => {
        await loadVolumes();
        renderApp();
        loadMenu();
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }
    </script>
