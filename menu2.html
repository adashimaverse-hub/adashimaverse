<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Pacifico&family=Yanone+Kaffeesatz:wght@400;600&family=Chewy&display=swap');

    #menu-component-wrapper {
        --sakura-pink: #fce4ec;
        --sakura-dark: #f06292;
        --hougetsu-blue: #e3f2fd;
        --hougetsu-dark: #64b5f6;
        --cream-white: #fffbf0;
        --text-main: #5c4b51;
        --glass-bg: rgba(255, 255, 255, 0.45);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: 0 8px 32px 0 rgba(135, 107, 145, 0.15);

        font-family: 'Nunito', sans-serif;
        color: var(--text-main);

        display: contents; 
    }

    #menu-component-wrapper .mobile-toggle {
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 12000;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        color: var(--sakura-dark);
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        display: none;               
        justify-content: center;
        align-items: center;
        font-size: 1.2rem;
        box-shadow: var(--glass-shadow);
        transition: all 0.3s ease;
    }

    #menu-component-wrapper .mobile-toggle:hover {
        transform: scale(1.1);
        background: white;
    }

    #menu-component-wrapper .sidebar {
        width: 300px;
        flex-shrink: 0;
        height: 100vh;
        position: sticky;
        top: 0;
        overflow-y: auto;

        background: linear-gradient(
            135deg,
            rgba(252, 228, 236, 0.72),
            rgba(227, 242, 253, 0.72)
        );
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-right: 1px solid var(--glass-border);
        box-shadow: 2px 0 20px rgba(135, 107, 145, 0.12);
        z-index: 11000;

        transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);

        background-image:
            radial-gradient(circle at 15% 50%, rgba(255,255,255,0.4) 0%, transparent 50%),
            radial-gradient(circle at 85% 30%, rgba(255,255,255,0.5) 0%, transparent 50%);
    }

    #menu-component-wrapper .sidebar::-webkit-scrollbar { width: 6px; }
    #menu-component-wrapper .sidebar::-webkit-scrollbar-thumb {
        background: rgba(240, 98, 146, 0.3);
        border-radius: 10px;
    }

    #menu-component-wrapper .sidebar-inner {
        padding: 30px 25px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-height: 100%;
    }

    #menu-component-wrapper .sidebar-box {
        position: relative;
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        background: transparent; 
        padding: 0; 
        margin-bottom: 25px; 
        transition: transform 0.3s ease;
    }
    
    #menu-component-wrapper .sidebar-box:hover { 
        transform: translateY(-5px); 
    }
    
    #menu-component-wrapper .sidebar-box img { 
        width: 100%; 
        max-width: 220px; 
        
        filter: drop-shadow(0 8px 15px rgba(240, 98, 146, 0.25));
        transition: transform 0.3s ease;
    }

    #menu-component-wrapper .sidebar-box:hover img {
        transform: scale(1.03);
    }

    #menu-component-wrapper .logo-label {
        position: relative;
        margin-top: -15px; 
        transform: rotate(-2deg); 
        
        font-family: 'Chewy', cursive;
        font-size: 1.8rem; 
        color: #e63971; 
        text-align: center;
        white-space: normal; 
        letter-spacing: 1px;
        line-height: 1.1;
        z-index: 10;
        pointer-events: none;
        width: 100%; 
        
        text-shadow: 
            -3px -3px 0 #fff,  
             3px -3px 0 #fff,
            -3px  3px 0 #fff,
             3px  3px 0 #fff,
            -3px  0px 0 #fff,
             3px  0px 0 #fff,
             0px -3px 0 #fff,
             0px  3px 0 #fff,
             0px  8px 15px rgba(230, 57, 113, 0.4); 
    }

    #menu-component-wrapper .logo-label span.to-text {
        font-size: 1.1rem;
        vertical-align: middle;
        color: #e63971;
    }

    #menu-component-wrapper .logo-label span.sub-text {
        display: block;
        font-size: 1.3rem;
        margin-top: -2px;
    }

    #menu-component-wrapper .menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        background: var(--glass-bg);
        color: var(--text-main);
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        box-sizing: border-box;
        cursor: pointer;
        font-family: 'Nunito', sans-serif;
    }

    #menu-component-wrapper .menu-btn:hover {
        background: white;
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(240, 98, 146, 0.15);
        color: var(--sakura-dark);
    }

    #menu-component-wrapper .menu-btn i {
        font-size: 1.1rem;
        color: var(--hougetsu-dark);
        transition: color 0.3s ease;
    }
    #menu-component-wrapper .menu-btn:hover i { color: var(--sakura-dark); }

    #menu-component-wrapper .fb-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        background: rgba(24, 119, 242, 0.1);
        color: #1877F2;
        border: 1px solid rgba(24, 119, 242, 0.2);
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
        cursor: pointer;
        font-family: 'Nunito', sans-serif;
    }
    #menu-component-wrapper .fb-btn i { color: #1877F2; }
    #menu-component-wrapper .fb-btn:hover {
        background: #1877F2;
        color: white;
        transform: translateY(-3px);
    }
    #menu-component-wrapper .fb-btn:hover i { color: white; }

    #menu-component-wrapper .info-card {
        background: rgba(255, 255, 255, 0.5);
        padding: 18px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid var(--glass-border);
        box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
    }

    #menu-component-wrapper .info-card h4 {
        margin: 0 0 10px 0;
        font-size: 0.9rem;
        color: var(--sakura-dark);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: 'Nunito', sans-serif;
    }

    #menu-component-wrapper .status-badge {
        display: inline-block;
        background: linear-gradient(135deg, var(--hougetsu-blue), var(--sakura-pink));
        padding: 6px 15px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--text-main);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    #menu-component-wrapper .links-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 15px;
    }

    #menu-component-wrapper .link-tag {
        background: white;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        text-decoration: none;
        color: var(--text-main);
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 1px solid transparent;
        font-family: 'Nunito', sans-serif;
    }
    #menu-component-wrapper .link-tag:hover {
        border-color: var(--sakura-pink);
        background: var(--sakura-pink);
        color: var(--sakura-dark);
        transform: translateX(5px);
    }

    @media (max-width: 900px) {
        #menu-component-wrapper .mobile-toggle { display: flex !important; }

        #menu-component-wrapper .sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            transform: translateX(-110%);
            border-radius: 0 30px 30px 0;
            border-right: none;
            box-shadow: 4px 0 30px rgba(135,107,145,0.25);
            z-index: 11000;
        }
        #menu-component-wrapper .sidebar.active { transform: translateX(0); }
    }

    @media (max-width: 600px) {
        #menu-component-wrapper .mobile-toggle {
            width: 56px;
            height: 56px;
            font-size: 1.4rem;
            left: 12px; top: 12px;
        }

        #menu-component-wrapper .sidebar {
            width: 100%;
            max-width: none;
            border-radius: 0;
            transform: translateX(-100%);
            padding: 0;
        }

        #menu-component-wrapper .sidebar-inner {
            padding: 22px;
            gap: 18px;
        }

        #menu-component-wrapper .sidebar-box img { max-width: 260px; }
        #menu-component-wrapper .logo-label { font-size: 2.2rem; }
        #menu-component-wrapper .logo-label span.sub-text { font-size: 1.4rem; }

        #menu-component-wrapper .menu-btn {
            padding: 14px 18px;
            font-size: 1.08rem;
            border-radius: 14px;
            min-height: 52px;
        }

        #menu-component-wrapper .fb-btn { padding: 14px 18px; font-size: 1.02rem; }

        #menu-component-wrapper .link-tag { font-size: 1rem; padding: 12px 14px; border-radius: 14px; }

        #menu-component-wrapper .info-card { padding: 16px; }
        #menu-component-wrapper .info-card h4 { font-size: 1rem; }

        #menu-component-wrapper .links-grid { gap: 12px; }
    }

    @media (max-width: 420px) {
        #menu-component-wrapper .mobile-toggle { width: 62px; height: 62px; font-size: 1.5rem; }
        #menu-component-wrapper .sidebar-inner { padding: 18px; gap: 14px; }
        #menu-component-wrapper .logo-label { font-size: 1.9rem; }
        #menu-component-wrapper .menu-btn { font-size: 1.02rem; padding: 12px 16px; }
        #menu-component-wrapper .link-tag { font-size: 0.98rem; padding: 12px; }
    }
</style>

<div id="menu-component-wrapper">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Pacifico&family=Yanone+Kaffeesatz:wght@400;600&display=swap" rel="stylesheet">

    <button class="mobile-toggle" id="menu-toggle-btn" onclick="menuToggle()">
        <i class="fas fa-bars"></i>
    </button>

    <nav class="sidebar" id="sideMenu">
        <div class="sidebar-inner">

            <div class="sidebar-box">
                <img src="Imagenes/AdaShima_flotante-Photoroom-Photoroom.png"
                     alt="Adachi to Shimamura"
                     onerror="this.src='https://via.placeholder.com/250x150/transparent/f06292?text=Adachi+to+Shimamura'">
                
                <div class="logo-label">
                    Adachi <span class="to-text">to</span> Shimamura<br>
                </div>
            </div>

            <a href="https://www.facebook.com/p/Adachi-to-Shimamura-Latinoamérica-61551058385796/"
                target="_blank" class="fb-btn">
                <i class="fab fa-facebook-f"></i>Visit us on Facebook
            </a>

            <div class="info-card">
                <h4><i class="fas fa-book-reader"></i> Novel Status</h4>
                <span class="status-badge">Publishing</span>
            </div>

            <div class="info-card">
                <h4><i class="fas fa-heart"></i> Support the Original Work</h4>
                <div class="links-grid">
                    <a href="https://dengekibunko.jp/product/adashima/" target="_blank" class="link-tag">
                        Light Novel <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="https://comic-walker.com/detail/KC_004197_S?episodeType=first" target="_blank" class="link-tag">
                        Manga <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="https://kakuyomu.jp/works/1177354054897444952" target="_blank" class="link-tag">
                        Author's Blog <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>

            <div style="margin-top:12px;">
                <a href="index.html" class="menu-btn" id="menu-back-home" title="Back to Home">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>

        </div>
    </nav>
</div>

<script>
(function() {
    function menuToggle() {
        const sidebar = document.getElementById('sideMenu');
        const btn     = document.getElementById('menu-toggle-btn');
        if (!sidebar || !btn) return;
        sidebar.classList.toggle('active');
        const icon = btn.querySelector('i');
        if (icon) {
            icon.classList.toggle('fa-bars',  !sidebar.classList.contains('active'));
            icon.classList.toggle('fa-times',  sidebar.classList.contains('active'));
        }
    }
    window.menuToggle = menuToggle;
    window.toggleMenu = menuToggle;

    document.addEventListener('click', function(e) {
        const sidebar = document.getElementById('sideMenu');
        const btn     = document.getElementById('menu-toggle-btn');
        if (!sidebar || !sidebar.classList.contains('active')) return;
        if (!sidebar.contains(e.target) && !btn.contains(e.target)) {
            sidebar.classList.remove('active');
            const icon = btn && btn.querySelector('i');
            if (icon) { icon.classList.replace('fa-times', 'fa-bars'); }
        }
    });
})();
</script>
