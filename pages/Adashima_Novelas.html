    async function smartDownload(url, fileName) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                showMessage(currentLang === 'es' ? 'Archivo no disponible.' : 'File not available.');
                return;
            }
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(a);
        } catch (error) {
            window.open(url, '_blank');
        }
    }

    function calcFitScaleSafe(page, containerEl) {
        const vp = page.getViewport({ scale: 1 });
        const w  = containerEl.clientWidth  - 48;
        const h  = containerEl.clientHeight - 48;

        const safeW = w  > 20 ? w  : Math.max(window.innerWidth  - 380, 300);
        const safeH = h  > 20 ? h  : Math.max(window.innerHeight - 200, 400);

        const scaleW = safeW / vp.width;
        const scaleH = safeH / vp.height;
        const scale  = Math.min(scaleW, scaleH, 2.5);

        return isFinite(scale) && scale > 0 ? scale : 1.0;
    }

                            <button class="pdf-btn" onclick="pdfAction('${vol.id}','next')" title="Página siguiente (→)"><i class="fas fa-chevron-right"></i></button>
                            <span class="pdf-page-info">Pág. <span id="page_num_${vol.id}">-</span> / <span id="page_count_${vol.id}">-</span></span>

    async function initPdfViewer(id) {
        const viewerEl    = document.getElementById('pdf-viewer-' + id);
        const canvas      = document.getElementById('pdf-render-' + id);
        const ctx         = canvas.getContext('2d');
        const loadingEl   = document.getElementById('pdf-loading-' + id);
        const loadingText = document.getElementById('pdf-loading-text-' + id);
        const errorEl     = document.getElementById('pdf-error-' + id);
        const containerEl = document.getElementById('canvas-container-' + id);

        const volData = VOLUMES.find(v => v.id === id);
        if (!volData || !volData[currentLang]) return;

        const langData = volData[currentLang];
        const baseUrl = currentLang === 'es' ? 'https://media.adashimaverse.com/Novelas/' : 'https://media.adashimaverse.com/Novelas/Ingles/';
        const fileTarget = currentLang === 'es' ? langData.file : langData.filePdf;

        if (pdfInstances[id]?.loading) return;

        const inst = pdfInstances[id] || {
            pdfDoc: null, pageNum: 1, rendering: false, pendingPage: null, scale: 1.0, fitScale: 1.0, loading: false, canvas, ctx, containerEl,
        };
        inst.loading = true;
        pdfInstances[id] = inst;

        if (loadingEl) loadingEl.classList.add('visible');
        if (errorEl)   errorEl.style.display = 'none';
        canvas.style.display = 'none';

        if (!fileTarget) {
            inst.loading = false;
            if (loadingEl) loadingEl.classList.remove('visible');
            if (errorEl) {
                const msgEl = document.getElementById('pdf-error-msg-' + id);
                if (msgEl) msgEl.textContent = currentLang === 'es' ? 'Documento no disponible.' : 'Document not available.';
                errorEl.style.display = 'flex';
            }
            return;
        }

        const url = baseUrl + encodeURIComponent(fileTarget);

        if (loadingText) {
            loadingText.textContent = currentLang === 'es' ? 'Cargando documento...' : 'Loading document...';
        }

        if (!inst._pageInputBound) {
            inst._pageInputBound = true;
            const pageInput = document.getElementById('page-input-' + id);
            if (pageInput) {
                pageInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter') {
                        const n = parseInt(pageInput.value);
                        if (n >= 1 && n <= inst.pdfDoc?.numPages) {
                            inst.pageNum = n;
                            queueRender(id);
                        }
                        pageInput.value = '';
                    }
                });
            }
        }

        const renderVersion = currentRenderVersion;
        const cacheKey = `${currentLang}-${id}`;

        try {
            let pdfData;

            if (pdfCache.has(cacheKey)) {
                pdfData = pdfCache.get(cacheKey);
            } else {
                const response = await fetch(url, { signal: globalAbortController.signal });
                if (!response.ok) throw new Error('Network error');
                const arrayBuffer = await response.arrayBuffer();
                pdfData = new Uint8Array(arrayBuffer);
                pdfCache.set(cacheKey, pdfData);
            }

            if (renderVersion !== currentRenderVersion) return;

            inst.pdfDoc = await pdfjsLib.getDocument({
                data: pdfData,
                cMapUrl: `${PDFJS_CDN}/cmaps/`,
                cMapPacked: true,
                rangeChunkSize: 65536
            }).promise;

            if (renderVersion !== currentRenderVersion) return;

            document.getElementById('page_count_' + id).textContent = inst.pdfDoc.numPages;

            const firstPage = await inst.pdfDoc.getPage(1);
            inst.fitScale   = calcFitScaleSafe(firstPage, containerEl);
            inst.scale      = inst.fitScale;

            updateZoomDisplay(id);
            await renderPage(id, 1);

            inst.loading = false;

        } catch (err) {
            if (err.name === 'AbortError') return;
            inst.pdfDoc = null;
            inst.loading = false;
            if (loadingEl) loadingEl.classList.remove('visible');
            if (errorEl) {
                const msgEl = document.getElementById('pdf-error-msg-' + id);
                if (msgEl) msgEl.textContent = currentLang === 'es' ? 'Documento no disponible.' : 'Document not available.';
                errorEl.style.display = 'flex';
            }
            canvas.style.display = 'none';
        }
    }

    async function renderPage(id, num) {
        const inst = pdfInstances[id];
        if (!inst || !inst.pdfDoc) return;

        num = Math.max(1, Math.min(num, inst.pdfDoc.numPages));
        inst.pageNum = num;

        if (inst.rendering) {
            inst.pendingPage = num;
            return;
        }
        inst.rendering = true;

        const loadingEl  = document.getElementById('pdf-loading-' + id);
        const progressEl = document.getElementById('pdf-progress-' + id);
        const pageNumEl  = document.getElementById('page_num_' + id);

        try {
            const page = await inst.pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: inst.scale });

            const outputScale = window.devicePixelRatio || 1;

            inst.canvas.width = Math.floor(viewport.width * outputScale);
            inst.canvas.height = Math.floor(viewport.height * outputScale);

            inst.canvas.style.width = Math.floor(viewport.width) + "px";
            inst.canvas.style.height =  Math.floor(viewport.height) + "px";
            inst.canvas.style.display = 'block';

            inst.ctx.clearRect(0, 0, inst.canvas.width, inst.canvas.height);

            const errorEl = document.getElementById('pdf-error-' + id);
            if (errorEl) errorEl.style.display = 'none';

            const transform = outputScale !== 1
                ? [outputScale, 0, 0, outputScale, 0, 0]
                : null;

            const renderContext = {
                canvasContext: inst.ctx,
                transform: transform,
                viewport: viewport
            };

            await page.render(renderContext).promise;

            if (pageNumEl) pageNumEl.textContent = num;

            const mobileNumEl = document.getElementById('mobile-page-num-' + id);
            const mobileCountEl = document.getElementById('mobile-page-count-' + id);
            if (mobileNumEl) mobileNumEl.textContent = num;
            if (mobileCountEl && inst.pdfDoc) mobileCountEl.textContent = inst.pdfDoc.numPages;
            if (progressEl) progressEl.style.width = ((num / inst.pdfDoc.numPages) * 100).toFixed(1) + '%';

        } catch (err) {
            const loadingText = document.getElementById('pdf-loading-text-' + id);
            if (loadingText) loadingText.textContent = currentLang === 'es' ? `Error en pág. ${num}.` : `Error on pg. ${num}.`;
            if (loadingEl) {
                loadingEl.classList.add('visible');
                setTimeout(() => loadingEl.classList.remove('visible'), 2500);
            }
        } finally {
            if (loadingEl) loadingEl.classList.remove('visible');
            inst.rendering = false;

            if (inst.pendingPage !== null) {
                const pending = inst.pendingPage;
                inst.pendingPage = null;
                renderPage(id, pending);
            }
        }
    }

    function queueRender(id) {
        const inst = pdfInstances[id];
        if (!inst) return;
        if (inst.rendering) {
            inst.pendingPage = inst.pageNum;
        } else {
            renderPage(id, inst.pageNum);
        }
    }

    const ZOOM_STEP = 0.15;
    const ZOOM_MIN  = 0.4;
    const ZOOM_MAX  = 3.0;

    function updateZoomDisplay(id) {
        const inst = pdfInstances[id];
        const el   = document.getElementById('zoom-display-' + id);
        if (!el || !inst) return;
        const pct = Math.round((inst.scale / inst.fitScale) * 100);
        el.textContent = pct + '%';

        const mobileNum = document.getElementById('mobile-page-num-' + id);
        const mobileCount = document.getElementById('mobile-page-count-' + id);
        const mob = document.getElementById('mobile-indicator-' + id);
        if (mobileNum && mobileCount && inst && inst.pdfDoc) {
            mobileNum.textContent = inst.pageNum;
            mobileCount.textContent = inst.pdfDoc.numPages;
            if (mob) mob.style.display = '';
        }
    }

    function applyZoom(id, newScale) {
        const inst = pdfInstances[id];
        if (!inst || !inst.pdfDoc) return;
        inst.scale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newScale));
        updateZoomDisplay(id);
        queueRender(id);
    }

    window.pdfAction = function(id, action) {
        const inst = pdfInstances[id];
        if (!inst) return;

        switch (action) {
            case 'prev':
                if (inst.pageNum > 1) { inst.pageNum--; queueRender(id); }
                break;
            case 'next':
                if (inst.pdfDoc && inst.pageNum < inst.pdfDoc.numPages) { inst.pageNum++; queueRender(id); }
                break;
            case 'zoomIn':
                applyZoom(id, inst.scale + ZOOM_STEP);
                break;
            case 'zoomOut':
                applyZoom(id, inst.scale - ZOOM_STEP);
                break;
            case 'zoomReset':
                applyZoom(id, inst.fitScale);
                break;
            case 'fullscreen': {
                const el = document.getElementById('pdf-viewer-' + id);
                if (!el) break;

                const isNativeFS = document.fullscreenElement === el || document.webkitFullscreenElement === el || document.msFullscreenElement === el;
                const isSimulated = el.classList.contains('fs-simulated');

                if (!isNativeFS && !isSimulated) {
                    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                    if (req) {
                        req.call(el).catch(() => enterSimulatedFS(el, id));
                    } else {
                        enterSimulatedFS(el, id);
                    }
                } else {
                    if (isNativeFS) {
                        const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
                        if (exit) exit.call(document);
                    } else if (isSimulated) {
                        exitSimulatedFS(el, id);
                    }
                }
                break;
            }
        }
    };

    document.addEventListener('fullscreenchange',      updateFSIcon);
    document.addEventListener('webkitfullscreenchange', updateFSIcon);
    function updateFSIcon() {
        document.querySelectorAll('[id^="fs-icon-"]').forEach(icon => {
            const id = icon.id.replace('fs-icon-', '');
            const viewer = document.getElementById('pdf-viewer-' + id);
            const inNativeFS = viewer && (document.fullscreenElement === viewer || document.webkitFullscreenElement === viewer || document.msFullscreenElement === viewer);
            const inSimulatedFS = viewer && viewer.classList.contains('fs-simulated');
            const inFS = !!(inNativeFS || inSimulatedFS);
            icon.className = inFS ? 'fas fa-compress' : 'fas fa-expand';

            if (inFS) {
                const inst = pdfInstances[id];
                if (inst && inst.pdfDoc) {
                    inst.pdfDoc.getPage(inst.pageNum).then(page => {
                        const containerEl = document.getElementById('canvas-container-' + id);
                        inst.fitScale = calcFitScaleSafe(page, containerEl);
                        inst.scale    = inst.fitScale;
                        updateZoomDisplay(id);
                        queueRender(id);
                    }).catch(()=>{});
                }
            }
        });
    }

    function enterSimulatedFS(viewerEl, id) {
        if (!viewerEl) return;
        viewerEl.classList.add('fs-simulated');
        document.body.style.overflow = 'hidden';

        const inst = pdfInstances[id];
        if (inst && inst.pdfDoc) {
            inst.pdfDoc.getPage(inst.pageNum).then(page => {
                const containerEl = document.getElementById('canvas-container-' + id);
                inst.fitScale = calcFitScaleSafe(page, containerEl);
                inst.scale = inst.fitScale;
                updateZoomDisplay(id);
                queueRender(id);
            }).catch(()=>{});
        }
        updateFSIcon();
    }

    function exitSimulatedFS(viewerEl, id) {
        if (!viewerEl) return;
        viewerEl.classList.remove('fs-simulated');
        document.body.style.overflow = '';
        const inst = pdfInstances[id];
        if (inst && inst.pdfDoc) {
            inst.pdfDoc.getPage(inst.pageNum).then(page => {
                const containerEl = document.getElementById('canvas-container-' + id);
                inst.fitScale = calcFitScaleSafe(page, containerEl);
                inst.scale = inst.fitScale;
                updateZoomDisplay(id);
                queueRender(id);
            }).catch(()=>{});
        }
        updateFSIcon();
    }

    document.addEventListener('wheel', e => {
        if (!activeId || !pdfInstances[activeId]) return;
        const viewer = document.getElementById('pdf-viewer-' + activeId);
        if (!viewer || !viewer.contains(e.target)) return;
        if (!e.ctrlKey && !e.metaKey) return;
        e.preventDefault();
        pdfAction(activeId, e.deltaY < 0 ? 'zoomIn' : 'zoomOut');
    }, { passive: false });

    document.addEventListener('keydown', e => {
        if (!activeId || !pdfInstances[activeId]) return;
        if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;

        switch (e.key) {
            case 'ArrowLeft':  e.preventDefault(); pdfAction(activeId, 'prev'); break;
            case 'ArrowRight': e.preventDefault(); pdfAction(activeId, 'next'); break;
            case '+': case '=': pdfAction(activeId, 'zoomIn');    break;
            case '-': case '_': pdfAction(activeId, 'zoomOut');   break;
            case '0':           pdfAction(activeId, 'zoomReset'); break;
            case 'f': case 'F': pdfAction(activeId, 'fullscreen'); break;
        }
    });

    function attachAccordion() {
        document.querySelectorAll('details.novel-item').forEach(detail => {
            detail.addEventListener('toggle', () => {
                if (detail.open) {
                    document.querySelectorAll('details.novel-item').forEach(other => {
                        if (other !== detail && other.open) other.removeAttribute('open');
                    });
                    const id = detail.id.replace('novel-', '');
                    activeId = id;
                    requestAnimationFrame(() => {
                        enableTouchNavigationForViewer(id);
                        initPdfViewer(id);
                    });
                } else {
                    activeId = null;
                }
            });
        });
    }

    function enableTouchNavigationForViewer(id) {
        const container = document.getElementById('canvas-container-' + id);
        if (!container) return;

        let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

        function isInteractive(el) {
            return el.closest && (
                el.closest('.pdf-toolbar') || el.closest('button') || el.closest('input') || el.closest('a') || el.closest('.pdf-controls-group') || el.closest('.pdf-page-input')
            );
        }

        container.addEventListener('touchstart', e => {
            if (!e.touches || e.touches.length !== 1) return;
            const touch = e.touches[0];

            if (isInteractive(e.target)) return;
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        container.addEventListener('touchend', e => {
            const touch = e.changedTouches && e.changedTouches[0];
            if (!touch) return;
            const dx = Math.abs(touch.clientX - touchStartX);
            const dy = Math.abs(touch.clientY - touchStartY);
            const dt = Date.now() - touchStartTime;

            if (dt > 350 || dx > 40 || dy > 40) return;
            if (isInteractive(e.target)) return;

            const rect = container.getBoundingClientRect();
            const relX = (touch.clientX - rect.left) / rect.width;

            if (relX <= 0.45) {
                pdfAction(id, 'prev');
            } else if (relX >= 0.55) {
                pdfAction(id, 'next');
            }
        }, { passive: true });
    }

    function renderGeneralDownloads() {
        const container = document.getElementById('general-downloads-container');
        if (currentLang === 'es') {
            container.style.display = 'none';
            container.innerHTML = '';
        } else {
            container.style.display = 'flex';
            container.innerHTML = `
                <button class="btn" onclick="smartDownload('https://media.adashimaverse.com/Novelas/Ingles/Adachi%20and%20Shimamura.pdf', 'Adachi and Shimamura Full.pdf')"><i class="fas fa-file-pdf"></i> Download PDF Full</button>
                <button class="btn" onclick="smartDownload('https://media.adashimaverse.com/Novelas/Ingles/Adachi%20and%20Shimamura.epub', 'Adachi and Shimamura Full.epub')"><i class="fas fa-book-open"></i> Download EPUB Full</button>
            `;
        }
    }

    async function loadMenu() {
        const menuFile = currentLang === 'es' ? 'menu.html' : 'menu2.html';
        const menuVer = Math.floor(Date.now() / 86400000);

        try {
            const response = await fetch(`${menuFile}?v=${menuVer}`);
            if (!response.ok) throw new Error('Error HTTP ' + response.status);
            const data = await response.text();

            const container = document.getElementById('sidebar-container') || document.getElementById('menu-container');
            if (!container) return;

            container.innerHTML = data;
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        } catch (error) {}
    }

    async function renderApp() {
        const title = document.getElementById('page-title');
        title.textContent = currentLang === 'es' ? 'Novelas Ligeras' : 'Light Novels';

        const footer = document.getElementById('footer-content');
        
        if (footer) {
            footer.innerHTML = currentLang === 'es'
                ? 'Fan site no oficial de Adachi to Shimamura.<br>Creado por fans, sin fines de lucro.<br>Adachi to Shimamura y todos sus derechos pertenecen a Hitoma Iruma.'
                : 'Unofficial Adachi to Shimamura fan site.<br>Created by fans, non-profit.<br>Adachi to Shimamura and all rights belong to Hitoma Iruma.';
        }

        const floatingAdashima = document.getElementById('floating-link');
        if (floatingAdashima) {
            floatingAdashima.title = currentLang === 'es' ? 'Ir al mini-juego' : 'Go to mini-game';
        }

        renderGeneralDownloads();

        const container = document.getElementById('novels-container');
        const openId = document.querySelector('details.novel-item[open]')?.id.replace('novel-', '');

        container.innerHTML = VOLUMES.map(buildVolumeHTML).join('');
        attachAccordion();

        if (openId) {
            const detail = document.getElementById('novel-' + openId);
            if (detail) {
                detail.setAttribute('open', '');
                activeId = openId;
                requestAnimationFrame(() => {
                    enableTouchNavigationForViewer(openId);
                    initPdfViewer(openId);
                });
            }
        }
    }

    async function switchLanguage(lang) {
        if (isSwitching || currentLang === lang) return;
        isSwitching = true;

        const langToggle = document.getElementById('langToggle');
        if (langToggle) {
            langToggle.disabled = true;
        }

        globalAbortController.abort();
        globalAbortController = new AbortController();
        currentRenderVersion++;

        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.documentElement.lang = lang;
        updateLangDropdownLabel();

        Object.keys(pdfInstances).forEach(k => {
            const inst = pdfInstances[k];
            if (inst) inst.pdfDoc = null;
        });

        await renderApp();
        await loadMenu();

        if (langToggle) {
            langToggle.disabled = false;
        }
        isSwitching = false;
    }

    const langDropdown = document.getElementById('langDropdown');
    const langToggle = document.getElementById('langToggle');

    if (langDropdown && langToggle) {
        langToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (langToggle.disabled) return;
            const isOpen = langDropdown.classList.toggle('open');
            langToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });

        document.querySelectorAll('.lang-option').forEach(option => {
            option.addEventListener('click', () => {
                const lang = option.getAttribute('data-lang');
                langDropdown.classList.remove('open');
                langToggle.setAttribute('aria-expanded', 'false');
                switchLanguage(lang);
            });
        });

        document.addEventListener('click', (e) => {
            if (langDropdown.classList.contains('open') && !langDropdown.contains(e.target)) {
                langDropdown.classList.remove('open');
                langToggle.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && langDropdown.classList.contains('open')) {
                langDropdown.classList.remove('open');
                langToggle.setAttribute('aria-expanded', 'false');
            }
        });
    }

    updateLangDropdownLabel();

    async function loadVolumes() {
        const dayKey = Math.floor(Date.now() / 86400000);
        try {
            const res = await fetch(`volumes.json?v=${dayKey}`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const remote = await res.json();
            if (Array.isArray(remote) && remote.length > 0) {
                VOLUMES.length = 0;
                remote.forEach(v => VOLUMES.push(v));
            }
        } catch (_) {

        }
    }

    (function() {
        const c = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDelay = Math.random() * 12 + 's';
            s.style.animationDuration = (9 + Math.random() * 5) + 's';
            c.appendChild(s);
        }
    })();

    document.addEventListener('DOMContentLoaded', async () => {
        await loadVolumes();
        renderApp();
        loadMenu();
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }
    </script>
